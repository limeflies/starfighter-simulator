<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starfighter Combat</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            color: #ffe81f;
            font-family: 'Courier New', Courier, monospace;

            canvas {
                display: block;
            }

            #ui {
                position: absolute;
                top: 20px;
                left: 20px;
                font-size: uiououio;
                text-shadow: 2px 2px 0 #000;
            }

            #shop {
                position: absolute;
                top: 0;
                right: 0;
                background: rgba(20, 20, 20, 0.9);
                border-left: 2px solid #ffe81f;
                padding: 15px;
                text-align: center;
                width: 280px;
                height: 100vh;
                max-height: 100vh;
                overflow-y: auto;
                box-sizing: border-box;
            }

            .shop-item {
                border-bottom: 1px solid #555;
                padding: 10px 0;
                display: flex;
                flex-direction: column;
                align-items: center;
            }

            .shop-item:last-child {
                border-bottom: none;
            }

            .shop-item h4 {
                margin: 0 0 5px 0;
                color: #fff;
                font-size: 16px;
            }

            .shop-item p {
                margin: 0 0 10px 0;
                font-size: 14px;
                color: #aaa;
            }

            button {
                background: #000;
                color: #ffe81f;
                border: 1px solid #ffe81f;
                padding: 8px 15px;
                cursor: pointer;
                font-family: inherit;
                font-weight: bold;
                transition: all 0.2s;
                width: 100%;
            }

            button:hover:not(:disabled) {
                background: #ffe81f;
                color: #000;
            }

            button:disabled {
                border-color: #555;
                color: #555;
                cursor: not-allowed;
            }

            #respawnScreen {
                position: absolute;
                top: 0;
                left: 0;
                width: 100vw;
                height: 100vh;
                background: rgba(0, 0, 0, 0.8);
                display: none;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                z-index: 100;
            }

            #respawnScreen h1 {
                font-size: 60px;
                color: #f00;
                margin-bottom: 20px;
            }

            #respawnScreen button {
                font-size: 24px;
                padding: 15px 30px;
                width: auto;
            }

            /* Custom Scrollbar */
            ::-webkit-scrollbar {
                width: 8px;
            }

            ::-webkit-scrollbar-track {
                background: #111;
            }

            ::-webkit-scrollbar-thumb {
                background: #ffe81f;
            }

            ::-webkit-scrollbar-thumb:hover {
                background: #fff;
            }

            #baseUI {
                position: absolute;
                top: 0;
                left: 0;
                width: 100vw;
                height: 100vh;
                background: rgba(10, 10, 20, 0.95);
                display: none;
                flex-direction: column;
                align-items: center;
                padding-top: 50px;
                z-index: 50;
            }

            #treeContainer {
                display: flex;
                flex-wrap: wrap;
                gap: 15px;
                justify-content: center;
                max-width: 900px;
                max-height: 60vh;
                overflow-y: auto;
                padding: 20px;
            }
            .tech-node {
                background: #222;
                border: 2px solid #555;
                padding: 10px;
                width: 160px;
                text-align: center;
                border-radius: 8px;
                position: relative;
            }
            .tech-node.unlocked { border-color: #0f0; background: #040; }
            .tech-node.available { border-color: #0ff; cursor: pointer; }
            .tech-node.available:hover { background: #044; }
            .tech-node.locked { opacity: 0.5; }
            .tech-node h4 { margin: 0 0 5px 0; color: #fff; font-size: 14px; }
            .tech-node p { margin: 0; font-size: 12px; color: #ccc; }

            #controls {
                position: absolute;
                bottom: 20px;
                left: 20px;
                display: flex;
                flex-direction: column;
                gap: 10px;
                z-index: 10;
            }

            #bossUI {
                position: absolute;
                top: 20px;
                left: 50%;
                transform: translateX(-50%);
                width: 400px;
                text-align: center;
                display: none;
            }

            #bossBar {
                width: 100%;
                height: 20px;
                background: #333;
                border: 2px solid #f00;
                margin-top: 5px;
            }

            #bossFill {
                width: 100%;
                height: 100%;
                background: #f00;
                transition: width 0.2s;
            }

            #warning {
                position: absolute;
                top: 30%;
                left: 50%;
                transform: translate(-50%, -50%);
                font-size: 60px;
                color: #f00;
                display: none;
                z-index: 100;
                text-shadow: 0 0 10px #f00;
            }
    </style>
</head>

<body>

    <div id="ui">
        <div>Level: <span id="levelVal">1</span> | Next Boss: <span id="timerVal">05:00</span></div>
        <div>Score: <span id="scoreVal">0</span></div>
        <div>Kills: <span id="killVal">0</span></div>
        <div>Credits: <span id="coinVal">0</span> | Gems: <span id="gemVal">0</span></div>
        <div>Hull Integrity: <span id="hpVal">100</span>%</div>
        <button onclick="toggleBase()" style="margin-top:10px; border-color:#0ff; color:#0ff;">UPGRADES</button>
    </div>

    <div id="shop">
        <h3>Hangar (Shop)</h3>
        <p>Current: <span id="currentShip">T-65 X-Wing</span></p>
        <div id="shopList"></div>
    </div>

    <div id="respawnScreen">
        <h1>SHIP DESTROYED</h1>
        <button onclick="respawn()">RESPAWN</button>
    </div>

    <div id="controls">
        <button onclick="restartGame()">RESTART</button>
        <button onclick="togglePause()" id="pauseBtn">PAUSE</button>
    </div>

    <div id="bossUI">
        <h2 style="color:#f00; margin:0;">BOSS ACTIVE</h2>
        <div id="bossBar">
            <div id="bossFill"></div>
        </div>
    </div>

    <div id="warning">WARNING: BOSS APPROACHING</div>

    <div id="baseUI">
        <h1 style="color:#0ff; margin-bottom:0;">AIRCRAFT UPGRADE TREE</h1>
        <h2 style="margin-top:5px;">Gems Available: <span id="baseGemVal">0</span></h2>
        <div id="treeContainer"></div>
        <button onclick="toggleBase()" style="margin-top: 20px; width: 200px; border-color:#0ff; color:#0ff;">BATTLE</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let score = 0;
        let kills = 0;
        let levelKills = 0;
        let coins = 0;
        let isGameOver = false;
        let wingmen = [
            { dx: -60, dy: 20, hp: 100, bulletSpeed: 10 },
            { dx: 60, dy: 20, hp: 100, bulletSpeed: 10 }
        ];
        let purchasedWingmenCount = 0;

        let gems = 0;
        let level = 1;
        let gameFrames = 0;
        let isPaused = false;
        let gameState = 'battle';
        let bossActive = false;
        let boss = null;
        let bossWarningTimer = 0;

        let unlockedTechs = []; // IDs of unlocked techs
        let upgrades = { hpBonus: 0, speedBonus: 0, fireRateBonus: 0, coinRateBonus: 0, missiles: false, missileSpeed: 0, laser: false, shield: 0 };

        const TECH_TREE = [
            { id: 'hp1', name: 'Basic Hull', desc: '+50 HP', cost: 30, req: [], effect: () => upgrades.hpBonus += 50 },
            { id: 'spd1', name: 'Basic Thrusters', desc: '+1 Speed', cost: 45, req: [], effect: () => upgrades.speedBonus += 1 },
            { id: 'fire1', name: 'Overcharge I', desc: '+2 Fire Rate', cost: 60, req: [], effect: () => upgrades.fireRateBonus += 2 },
            { id: 'coin1', name: 'Scanner I', desc: '+Coin Drop', cost: 90, req: [], effect: () => upgrades.coinRateBonus += 1 },
            { id: 'hp2', name: 'Reinforced Hull', desc: '+100 HP', cost: 80, req: ['hp1'], effect: () => upgrades.hpBonus += 100 },
            { id: 'spd2', name: 'Advanced Thrusters', desc: '+1.5 Speed', cost: 100, req: ['spd1'], effect: () => upgrades.speedBonus += 1.5 },
            { id: 'fire2', name: 'Overcharge II', desc: '+3 Fire Rate', cost: 150, req: ['fire1'], effect: () => upgrades.fireRateBonus += 3 },
            { id: 'coin2', name: 'Scanner II', desc: '++Coin Drop', cost: 200, req: ['coin1'], effect: () => upgrades.coinRateBonus += 2 },
            { id: 'shield1', name: 'Energy Shield I', desc: 'Absorb 1 hit', cost: 150, req: ['hp2'], effect: () => upgrades.shield = 1 },
            { id: 'evasion', name: 'Evasion Matrix', desc: '+2 Speed', cost: 150, req: ['spd2'], effect: () => upgrades.speedBonus += 2 },
            { id: 'missiles1', name: 'Missile Pods', desc: 'Homing Missiles', cost: 250, req: ['fire2'], effect: () => { upgrades.missiles = true; upgrades.missileSpeed = 9; } },
            { id: 'luck1', name: 'Fortune System', desc: 'More Gems', cost: 300, req: ['coin2'], effect: () => {} },
            { id: 'hp3', name: 'Titanium Hull', desc: '+200 HP', cost: 250, req: ['hp2'], effect: () => upgrades.hpBonus += 200 },
            { id: 'spd3', name: 'Plasma Thrusters', desc: '+2 Speed', cost: 300, req: ['spd2'], effect: () => upgrades.speedBonus += 2 },
            { id: 'fire3', name: 'Overcharge III', desc: '+4 Fire Rate', cost: 400, req: ['fire2'], effect: () => upgrades.fireRateBonus += 4 },
            { id: 'shield2', name: 'Energy Shield II', desc: 'Absorb 3 hits', cost: 400, req: ['shield1'], effect: () => upgrades.shield = 3 },
            { id: 'missiles2', name: 'Advanced Missiles', desc: 'Faster Missiles', cost: 500, req: ['missiles1'], effect: () => upgrades.missileSpeed = 14 },
            { id: 'laser1', name: 'Laser Cannon', desc: 'Piercing Beams', cost: 600, req: ['fire3'], effect: () => upgrades.laser = true },
            { id: 'hp4', name: 'Nanite Hull', desc: 'Passive Heal', cost: 500, req: ['hp3'], effect: () => upgrades.hpBonus += 100 },
            { id: 'spd4', name: 'Warp Drive', desc: '+3 Speed', cost: 500, req: ['spd3'], effect: () => upgrades.speedBonus += 3 },
            { id: 'apex_offense', name: 'Apex Predator', desc: 'Massive Firepower', cost: 1500, req: ['laser1', 'missiles2'], effect: () => upgrades.fireRateBonus += 10 },
            { id: 'apex_defense', name: 'Aegis Core', desc: 'Massive Armor', cost: 1500, req: ['hp4', 'shield2'], effect: () => upgrades.hpBonus += 1000 }
        ];

        const keys = { w: false, a: false, s: false, d: false, space: false };
        window.addEventListener('keydown', e => {
            if (e.key === 'w' || e.key === 'ArrowUp') keys.w = true;
            if (e.key === 'a' || e.key === 'ArrowLeft') keys.a = true;
            if (e.key === 's' || e.key === 'ArrowDown') keys.s = true;
            if (e.key === 'd' || e.key === 'ArrowRight') keys.d = true;
            if (e.key === ' ') keys.space = true;
        });
        window.addEventListener('keyup', e => {
            if (e.key === 'w' || e.key === 'ArrowUp') keys.w = false;
            if (e.key === 'a' || e.key === 'ArrowLeft') keys.a = false;
            if (e.key === 's' || e.key === 'ArrowDown') keys.s = false;
            if (e.key === 'd' || e.key === 'ArrowRight') keys.d = false;
            if (e.key === ' ') keys.space = false;
        });

        const stars = [];
        for (let i = 0; i < 100; i++) {
            stars.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, size: Math.random() * 2, speed: Math.random() * 3 + 1 });
        }

        let bullets = [];
        let enemies = [];
        let enemyBullets = [];

        let particles = [];
        let powerups = [];

        // 22 Jets/Ships
        const SHIPS = [
            { id: 0, name: "T-65 X-Wing", color: "#ccc", speed: 5, fireRate: 15, hp: 100, bulletColor: "#f00", price: 0, shape: "xwing" },
            { id: 1, name: "F-16 Falcon", color: "#8a8d8f", speed: 6, fireRate: 12, hp: 100, bulletColor: "#0ff", price: 50, shape: "jet" },
            { id: 2, name: "F-14 Tomcat", color: "#666", speed: 6.5, fireRate: 11, hp: 120, bulletColor: "#ff0", price: 100, shape: "jet" },
            { id: 3, name: "A-Wing", color: "#c33", speed: 8, fireRate: 8, hp: 80, bulletColor: "#f00", price: 150, shape: "triangle" },
            { id: 4, name: "Y-Wing", color: "#ddaa00", speed: 4, fireRate: 20, hp: 200, bulletColor: "#f00", price: 200, shape: "ywing" },
            { id: 5, name: "F-15 Eagle", color: "#777", speed: 7, fireRate: 10, hp: 130, bulletColor: "#0ff", price: 250, shape: "jet" },
            { id: 6, name: "F-22 Raptor", color: "#555", speed: 9, fireRate: 7, hp: 150, bulletColor: "#0ff", price: 300, shape: "jet" },
            { id: 7, name: "F-35 Lightning", color: "#444", speed: 8.5, fireRate: 9, hp: 160, bulletColor: "#0ff", price: 350, shape: "jet" },
            { id: 8, name: "A-10 Warthog", color: "#565", speed: 4, fireRate: 3, hp: 300, bulletColor: "#ff0", price: 400, shape: "jet" },
            { id: 9, name: "Su-27 Flanker", color: "#689", speed: 7, fireRate: 10, hp: 140, bulletColor: "#f00", price: 450, shape: "jet" },
            { id: 10, name: "MiG-29 Fulcrum", color: "#788", speed: 7.5, fireRate: 9, hp: 120, bulletColor: "#f00", price: 500, shape: "jet" },
            { id: 11, name: "Eurofighter", color: "#999", speed: 8, fireRate: 8, hp: 130, bulletColor: "#0ff", price: 550, shape: "triangle" },
            { id: 12, name: "Dassault Rafale", color: "#888", speed: 8, fireRate: 8, hp: 130, bulletColor: "#0ff", price: 600, shape: "triangle" },
            { id: 13, name: "Saab Gripen", color: "#9a9", speed: 7.5, fireRate: 9, hp: 120, bulletColor: "#0ff", price: 650, shape: "triangle" },
            { id: 14, name: "B-Wing", color: "#33c", speed: 5, fireRate: 15, hp: 250, bulletColor: "#f00", price: 700, shape: "cross" },
            { id: 15, name: "TIE Fighter", color: "#222", speed: 6, fireRate: 10, hp: 80, bulletColor: "#0f0", price: 750, shape: "tie" },
            { id: 16, name: "TIE Interceptor", color: "#333", speed: 9, fireRate: 6, hp: 90, bulletColor: "#0f0", price: 800, shape: "tie" },
            { id: 17, name: "SR-71 Blackbird", color: "#111", speed: 12, fireRate: 15, hp: 150, bulletColor: "#f80", price: 900, shape: "triangle" },
            { id: 18, name: "B-2 Spirit", color: "#222", speed: 4, fireRate: 25, hp: 400, bulletColor: "#f00", price: 1000, shape: "triangle" },
            { id: 19, name: "Millennium Falcon", color: "#ddd", speed: 7, fireRate: 6, hp: 500, bulletColor: "#f00", price: 1200, shape: "falcon" },
            { id: 20, name: "Naboo Fighter", color: "#ffaa00", speed: 10, fireRate: 8, hp: 120, bulletColor: "#0f0", price: 1500, shape: "jet" },
            { id: 21, name: "Jedi Starfighter", color: "#a00", speed: 11, fireRate: 5, hp: 180, bulletColor: "#0f0", price: 2000, shape: "triangle" },
            { id: 22, name: "Su-57 Felon", color: "#567", speed: 11, fireRate: 8, hp: 200, bulletColor: "#f0f", price: 1400, shape: "jet", bulletSpeed: 11 },
            { id: 23, name: "SR-72 Darkstar (Legendary)", color: "#111", speed: 15, fireRate: 4, hp: 300, bulletColor: "#fff", price: 999999, shape: "triangle", bulletSpeed: 16 }
        ];



        let ownedShips = [0]; // Own X-Wing by default

        const player = { x: canvas.width / 2, y: canvas.height - 100, width: 40, height: 50, ship: SHIPS[0], hp: 100, cooldown: 0 };

        function initShop() {
            const list = document.getElementById('shopList');
            list.innerHTML = '';

            const wingmanItem = document.createElement('div');
            wingmanItem.className = 'shop-item';
            wingmanItem.innerHTML = `
                <h4>+2 Wingmen</h4>
                <p>Add 2 escorts to fleet</p>
                <button onclick="buyWingmen()" ${coins < 500 ? 'disabled' : ''}>Buy (500 Cr)</button>
            `;
            list.appendChild(wingmanItem);

            let sortedShips = [...SHIPS].sort((a, b) => a.price - b.price);
            sortedShips.forEach(ship => {
                const item = document.createElement('div');
                item.className = 'shop-item';

                let btnHtml = '';
                if (ownedShips.includes(ship.id)) {
                    if (player.ship.id === ship.id) {
                        btnHtml = `<button disabled>Equipped</button>`;
                    } else {
                        btnHtml = `<button onclick="equipShip(${ship.id})">Equip</button>`;
                    }
                } else {
                    btnHtml = `<button onclick="buyShip(${ship.id})" ${coins < ship.price ? 'disabled' : ''}>Buy (${ship.price} Cr)</button>`;
                }

                item.innerHTML = `
                    <h4>${ship.name}</h4>
                    <p>Spd: ${ship.speed} | HP: ${ship.hp}</p>
                    ${btnHtml}
                `;
                list.appendChild(item);
            });
            document.getElementById('currentShip').innerText = player.ship.name;
        }

        window.buyShip = function (id) {
            const ship = SHIPS.find(s => s.id === id);
            if (coins >= ship.price && !ownedShips.includes(id)) {
                coins -= ship.price;
                ownedShips.push(id);
                equipShip(id);
            }
        };

        window.buyWingmen = function () {
            if (coins >= 500) {
                coins -= 500;
                purchasedWingmenCount += 2;
                let c = wingmen.length;
                let offset = (Math.floor(c / 2) + 1) * 60;
                let hOffset = 20 + Math.floor(c / 2) * 20;
                wingmen.push({ dx: -offset, dy: hOffset, hp: player.ship.hp });
                wingmen.push({ dx: offset, dy: hOffset, hp: player.ship.hp });
                initShop();
                updateUI();
            }
        };

        window.equipShip = function (id) {
            const ship = SHIPS.find(s => s.id === id);
            player.ship = ship;
            player.hp = ship.hp + upgrades.hpBonus; // Refill HP on equip
            wingmen.forEach(wm => wm.hp = ship.hp + upgrades.hpBonus);
            initShop();
            updateUI();
        };

        function spawnEnemy() {
            if (Math.random() < 0.02 * Math.pow(1.6, level - 1)) {
                let shipTemplate = SHIPS[Math.floor(Math.random() * SHIPS.length)];
                let eType = {
                    id: shipTemplate.id,
                    type: shipTemplate.name,
                    hp: Math.floor(Math.random() * 3 + 5) * 10, // 50, 60, or 70 HP (5-7 hits)
                    speed: shipTemplate.speed, // same speed as hangar says
                    score: shipTemplate.price || 100, // score based on price
                    color: shipTemplate.color,
                    bullets: Math.max(1, Math.floor(20 / shipTemplate.fireRate)), // more bullets for faster ships
                    shootChance: 0.05,
                    shape: shipTemplate.shape,
                    bulletColor: shipTemplate.bulletColor
                };
                enemies.push({ 
                    x: Math.random() * (canvas.width - 40) + 20, 
                    y: -50, 
                    width: 30, 
                    height: 30, 
                    speed: eType.speed, // exactly as hangar says
                    hp: eType.hp, // 5 to 7 hits
                    eData: eType
                });
            }
        }

        function createExplosion(x, y, color) {
            for (let i = 0; i < 15; i++) { particles.push({ x: x, y: y, vx: (Math.random() - 0.5) * 5, vy: (Math.random() - 0.5) * 5, life: 30, color: color }); }
        }

        window.toggleBase = function () {
            if (gameState === 'battle') {
                gameState = 'base';
                renderTechTree();
                document.getElementById('baseUI').style.display = 'flex';
                document.getElementById('shop').style.display = 'none';
                document.getElementById('ui').style.display = 'none';
                document.getElementById('controls').style.display = 'none';
            } else {
                gameState = 'battle';
                document.getElementById('baseUI').style.display = 'none';
                document.getElementById('shop').style.display = 'block';
                document.getElementById('ui').style.display = 'block';
                document.getElementById('controls').style.display = 'flex';
            }
            updateUI();
        };

        function renderTechTree() {
            const container = document.getElementById('treeContainer');
            if(!container) return;
            container.innerHTML = '';
            TECH_TREE.forEach(tech => {
                const node = document.createElement('div');
                let isUnlocked = unlockedTechs.includes(tech.id);
                let canUnlock = tech.req.every(req => unlockedTechs.includes(req)) && gems >= tech.cost;
                
                if (isUnlocked) {
                    node.className = 'tech-node unlocked';
                } else if (canUnlock) {
                    node.className = 'tech-node available';
                    node.onclick = () => buyTech(tech.id);
                } else {
                    node.className = 'tech-node locked';
                }
                
                node.innerHTML = `
                    <h4>${tech.name}</h4>
                    <p>${tech.desc}</p>
                    <small>${isUnlocked ? 'UNLOCKED' : tech.cost + ' Gems'}</small>
                    ${tech.req.length > 0 ? `<br><small style="color:#aaa">Req: ${tech.req.join(', ')}</small>` : ''}
                `;
                container.appendChild(node);
            });
        }

        window.buyTech = function(id) {
            let tech = TECH_TREE.find(t => t.id === id);
            if (gems >= tech.cost && !unlockedTechs.includes(id)) {
                let canUnlock = tech.req.every(req => unlockedTechs.includes(req));
                if (canUnlock) {
                    gems -= tech.cost;
                    unlockedTechs.push(id);
                    tech.effect();
                    player.hp = player.ship.hp + upgrades.hpBonus;
                    wingmen.forEach(wm => wm.hp = player.ship.hp + upgrades.hpBonus);
                    updateUI();
                    renderTechTree();
                }
            }
        };

        window.togglePause = function () {
            isPaused = !isPaused;
            document.getElementById('pauseBtn').innerText = isPaused ? "RESUME" : "PAUSE";
        };

        window.restartGame = function () {
            score = 0; kills = 0; levelKills = 0; coins = 0; gems = 0; level = 1; gameFrames = 0;
            isPaused = false; gameState = 'battle';
            bossActive = false; boss = null; bossWarningTimer = 0;
            upgrades = { hpBonus: 0, speedBonus: 0, fireRateBonus: 0, coinRateBonus: 0, missiles: false, missileSpeed: 0, laser: false, shield: 0 };
            unlockedTechs = [];
            document.getElementById('bossUI').style.display = 'none';
            document.getElementById('warning').style.display = 'none';
            document.getElementById('pauseBtn').innerText = "PAUSE";
            respawn();
        };

        function updateUI() {
            document.getElementById('scoreVal').innerText = score;
            document.getElementById('killVal').innerText = kills;
            document.getElementById('coinVal').innerText = coins;
            document.getElementById('gemVal').innerText = gems;
            document.getElementById('baseGemVal').innerText = gems;
            document.getElementById('levelVal').innerText = level;
            document.getElementById('timerVal').innerText = bossActive ? "BOSS BATTLE!" : Math.max(0, 30 - levelKills) + " Kills";
            document.getElementById('hpVal').innerText = Math.max(0, player.hp);
            initShop();
        }

                // Detailed top-down pseudo-3D flight rendering engine
        function drawDetailedJet(x, y, ship, isPlayer, isEnemy = false) {
            ctx.save();
            ctx.translate(x, y);
            
            // If it's an enemy, scale y by -1 to face down
            if (isEnemy) {
                ctx.scale(1, -1);
            }
            
            let scale = isPlayer ? 1.0 : 0.75;
            ctx.scale(scale, scale);
            
            let color = ship.color || "#888";
            let cockpitColor = isPlayer ? "#0ff" : "#f50";
            
            // 3D Altitude Drop Shadow
            ctx.save();
            ctx.translate(10, 15 * (isEnemy ? -1 : 1));
            ctx.fillStyle = "rgba(0, 0, 0, 0.35)";
            ctx.beginPath();
            ctx.moveTo(0, -25);

        }

        function drawEnemy(e) {
            if (!e.eData) return;
            drawDetailedJet(e.x, e.y, e.eData, false, true);
        }

        function drawContraBoss(ctx, boss) {
            ctx.save();
            ctx.translate(boss.x, boss.y);
            let hpRatio = boss.hp / boss.maxHp;
            
            if (boss.type === 'mega') {
                ctx.fillStyle = "#333"; ctx.fillRect(-150, -50, 300, 100);
                ctx.fillStyle = "#555"; ctx.fillRect(-180, -20, 30, 80); ctx.fillRect(150, -20, 30, 80);
                ctx.fillStyle = hpRatio < 0.3 ? "#f00" : "#fa0"; ctx.beginPath(); ctx.arc(0, 0, 30 + Math.sin(Date.now() / 100) * 5, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = "#222"; ctx.fillRect(-100, 10, 40, 20); ctx.fillRect(60, 10, 40, 20);
                ctx.fillStyle = "#666"; ctx.fillRect(-120, 30, 20, 40); ctx.fillRect(100, 30, 20, 40); ctx.fillRect(-20, 50, 40, 30);
            } else {
                let baseColor = boss.type === 0 ? "#800" : (boss.type === 1 ? "#080" : "#008");
                let coreColor = boss.type === 0 ? "#f00" : (boss.type === 1 ? "#0f0" : "#00f");
                ctx.fillStyle = baseColor; ctx.beginPath(); ctx.moveTo(0, -60); ctx.lineTo(80, 0); ctx.lineTo(40, 40); ctx.lineTo(-40, 40); ctx.lineTo(-80, 0); ctx.fill();
                ctx.fillStyle = "#444"; ctx.fillRect(-30, -20, 60, 40);
                ctx.fillStyle = "#0ff"; ctx.fillRect(-50, -30, 20, 10); ctx.fillRect(30, -30, 20, 10);
                ctx.fillStyle = "#777"; ctx.fillRect(-60, 10, 15, 30); ctx.fillRect(45, 10, 15, 30);
                ctx.fillStyle = hpRatio < 0.3 ? "#f00" : coreColor; ctx.beginPath(); ctx.arc(0, 0, 15, 0, Math.PI * 2); ctx.fill();
            }
            ctx.restore();
        }

        function update() {
            if (isGameOver) return;
            if (isPaused || gameState === 'base') {
                requestAnimationFrame(update);
                return;
            }

            gameFrames++;
            if (gameFrames % 60 === 0) updateUI(); // Update timer every second

            if (!bossActive && levelKills >= 30) {
                bossActive = true;
                bossWarningTimer = 0;
                let isMegaVillain = (level % 10 === 0);
                let multiplier = isMegaVillain ? 5 : 1;
                boss = { x: canvas.width / 2, y: -100, hp: 1000 * Math.pow(1.5, level - 1) * multiplier, maxHp: 1000 * Math.pow(1.5, level - 1) * multiplier, speed: isMegaVillain ? 1 : 2, dir: 1, type: isMegaVillain ? 'mega' : level % 3 };
                document.getElementById('bossUI').style.display = 'block';
            }

            ctx.fillStyle = "#000"; ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = "#fff";
            stars.forEach(star => {
                star.y += star.speed;
                if (star.y > canvas.height) { star.y = 0; star.x = Math.random() * canvas.width; }
                ctx.beginPath(); ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2); ctx.fill();
            });

            let pSpeed = player.ship.speed + upgrades.speedBonus;
            if (keys.w && player.y > 20) player.y -= pSpeed;
            if (keys.s && player.y < canvas.height - 30) player.y += pSpeed;
            if (keys.a && player.x > 20) player.x -= pSpeed;
            if (keys.d && player.x < canvas.width - 20) player.x += pSpeed;

            if (player.cooldown > 0) player.cooldown--;
            if (keys.space && player.cooldown === 0) {
                let pBulletSpeed = 7;
                if (player.ship.fireRate < 10) {
                    bullets.push({ x: player.x - 10, y: player.y - 20, speed: pBulletSpeed, width: 4, height: 15, color: player.ship.bulletColor });
                    bullets.push({ x: player.x + 10, y: player.y - 20, speed: pBulletSpeed, width: 4, height: 15, color: player.ship.bulletColor });
                } else {
                    bullets.push({ x: player.x, y: player.y - 25, speed: pBulletSpeed, width: 3, height: 15, color: player.ship.bulletColor });
                }
                wingmen.forEach(wm => {
                    bullets.push({ x: player.x + wm.dx, y: player.y + wm.dy - 20, speed: pBulletSpeed, width: 3, height: 15, color: player.ship.bulletColor });
                });
                
                if (upgrades.missiles) {
                    bullets.push({ x: player.x, y: player.y, speed: upgrades.missileSpeed, width: 6, height: 12, color: "#f80", isMissile: true });
                }
                
                player.cooldown = Math.max(2, player.ship.fireRate - upgrades.fireRateBonus);
            }

            for (let i = bullets.length - 1; i >= 0; i--) {
                let b = bullets[i];
                
                if (b.isMissile && enemies.length > 0) {
                    let target = enemies[0];
                    let minDist = Infinity;
                    enemies.forEach(e => {
                        let d = Math.hypot(e.x - b.x, e.y - b.y);
                        if (d < minDist) { minDist = d; target = e; }
                    });
                    if (target.x < b.x) b.x -= 2;
                    if (target.x > b.x) b.x += 2;
                }
                
                b.y -= b.speed;
                ctx.fillStyle = b.color; ctx.shadowBlur = 10; ctx.shadowColor = b.color;
                ctx.fillRect(b.x - b.width / 2, b.y, b.width, b.height); ctx.shadowBlur = 0;
                if (b.y < -20) bullets.splice(i, 1);
            }

            if (!bossActive || bossWarningTimer > 0) {
                spawnEnemy();
            }
            if (bossWarningTimer > 0) bossWarningTimer--;

            for (let i = enemies.length - 1; i >= 0; i--) {
                let e = enemies[i];
                e.y += e.speed;
                drawEnemy(e);

                let eType = e.eData;
                if (!eType) continue; // skip if somehow no data
                
                if (Math.random() < eType.shootChance * Math.pow(1.6, level - 1)) {
                    if (eType.bullets === 1) {
                        enemyBullets.push({ x: e.x, y: e.y + 10, speed: 7, width: 4, height: 15, color: eType.color });
                    } else if (eType.bullets === 2) {
                        enemyBullets.push({ x: e.x - 10, y: e.y + 10, speed: 7, width: 4, height: 15, color: eType.color });
                        enemyBullets.push({ x: e.x + 10, y: e.y + 10, speed: 7, width: 4, height: 15, color: eType.color });
                    } else {
                        // Spread shot for 3+ bullets
                        for(let b=0; b<eType.bullets; b++) {
                            let spread = (b - (eType.bullets-1)/2) * 10;
                            enemyBullets.push({ x: e.x + spread, y: e.y + 10, speed: 7, width: 4, height: 15, color: eType.color });
                        }
                    }
                }

                for (let j = bullets.length - 1; j >= 0; j--) {
                    let b = bullets[j];
                    if (b.x > e.x - 20 && b.x < e.x + 20 && b.y > e.y - 15 && b.y < e.y + 15) {
                        e.hp -= 10; bullets.splice(j, 1); createExplosion(b.x, b.y, "#f80");
                        if (e.hp <= 0) {
                            score += eType.score;
                            coins += Math.floor(eType.score / 10);
                            kills++;
                            levelKills++;
                            
                            if (kills % 1000 === 0 && kills > 0) {
                                if (!ownedShips.includes(23)) {
                                    ownedShips.push(23); // Unlock Legendary Jet
                                }
                            }
                            
                            if (Math.random() < 0.25) { // 1 in 4 kills
                                powerups.push({ x: e.x, y: e.y, speed: 2, type: '-2' });
                            }
                            
                            createExplosion(e.x, e.y, "#f00");
                            if (kills % 200 === 0 && kills > 0) {
                                if (Math.random() < 0.5) powerups.push({ x: e.x, y: e.y, speed: 2, type: 'x2' });
                                else powerups.push({ x: e.x, y: e.y, speed: 2, type: '+100' });
                            }
                            enemies.splice(i, 1);
                            updateUI();
                        }
                        break;
                    }
                }
                if (e.y > canvas.height + 20) enemies.splice(i, 1);
            }

            if (boss) {
                if (boss.y < 100) boss.y += 1;
                boss.x += boss.speed * boss.dir;
                
                let hitBoxW = boss.type === 'mega' ? 150 : 80;
                let hitBoxH = boss.type === 'mega' ? 100 : 60;
                
                if (boss.x < hitBoxW || boss.x > canvas.width - hitBoxW) boss.dir *= -1;

                drawContraBoss(ctx, boss);

                document.getElementById('bossFill').style.width = (boss.hp / boss.maxHp * 100) + '%';

                let bossFireRate = (boss.type === 'mega' ? 0.2 : 0.05) * Math.pow(1.6, level - 1);
                if (Math.random() < bossFireRate) {
                    if (boss.type === 'mega') {
                        for(let b=0; b<5; b++) {
                            let spread = (b - 2) * 30;
                            enemyBullets.push({ x: boss.x + spread, y: boss.y + 60, speed: 15, width: 8, height: 20, color: "#f00" });
                        }
                    } else {
                        enemyBullets.push({ x: boss.x - 45, y: boss.y + 40, speed: 20, width: 6, height: 15, color: "#fa0" });
                        enemyBullets.push({ x: boss.x + 45, y: boss.y + 40, speed: 20, width: 6, height: 15, color: "#fa0" });
                    }
                }

                for (let j = bullets.length - 1; j >= 0; j--) {
                    let b = bullets[j];
                    if (b.x > boss.x - hitBoxW && b.x < boss.x + hitBoxW && b.y > boss.y - hitBoxH && b.y < boss.y + hitBoxH) {
                        boss.hp -= 10; bullets.splice(j, 1); createExplosion(b.x, b.y, "#ff0");
                        if (boss.hp <= 0) {
                            let bossScore = boss.type === 'mega' ? 2500 : 500;
                            score += bossScore;
                            coins += Math.floor(bossScore / 10);
                            level++;
                            let gemReward = Math.floor(score / 50);
                            gems += gemReward;

                            for (let g = 0; g < 20; g++) {
                                powerups.push({ x: boss.x + (Math.random() - 0.5) * 100, y: boss.y + (Math.random() - 0.5) * 100, speed: Math.random() * 2 + 1, type: 'gem' });
                            }

                            createExplosion(boss.x, boss.y, "#fff");
                            createExplosion(boss.x - 30, boss.y, "#fff");
                            createExplosion(boss.x + 30, boss.y, "#fff");
                            boss = null;
                            bossActive = false;
                            document.getElementById('bossUI').style.display = 'none';
                            levelKills = 0;
                            gameFrames = 0;
                            updateUI();
                        }
                        break;
                    }
                }
            }

            for (let i = enemyBullets.length - 1; i >= 0; i--) {
                let eb = enemyBullets[i];
                eb.y += eb.speed;

                if (eb.isPlasma) {
                    ctx.fillStyle = eb.color; ctx.shadowBlur = 10; ctx.shadowColor = eb.color;
                    ctx.beginPath(); ctx.arc(eb.x, eb.y, eb.width / 2, 0, Math.PI * 2); ctx.fill(); ctx.shadowBlur = 0;
                } else {
                    ctx.fillStyle = eb.color; ctx.shadowBlur = 10; ctx.shadowColor = eb.color;
                    ctx.fillRect(eb.x - eb.width / 2, eb.y, eb.width, eb.height); ctx.shadowBlur = 0;
                }

                if (eb.x > player.x - player.width / 2 && eb.x < player.x + player.width / 2 && eb.y > player.y - player.height / 2 && eb.y < player.y + player.height / 2) {
                    player.hp -= 10; enemyBullets.splice(i, 1); createExplosion(player.x, player.y, "#f00"); updateUI();
                    if (player.hp <= 0) gameOver();
                } else {
                    let hitWingman = false;
                    for (let w = wingmen.length - 1; w >= 0; w--) {
                        let wm = wingmen[w];
                        let wx = player.x + wm.dx;
                        let wy = player.y + wm.dy;
                        if (eb.x > wx - player.width / 2 && eb.x < wx + player.width / 2 && eb.y > wy - player.height / 2 && eb.y < wy + player.height / 2) {
                            wm.hp -= 10; hitWingman = true; enemyBullets.splice(i, 1); createExplosion(wx, wy, "#f00");
                            if (wm.hp <= 0) wingmen.splice(w, 1);
                            break;
                        }
                    }
                    if (!hitWingman && eb.y > canvas.height + 20) { enemyBullets.splice(i, 1); }
                }
            }

            for (let i = powerups.length - 1; i >= 0; i--) {
                let p = powerups[i];
                p.y += p.speed;
                if (p.type === 'gem') {
                    ctx.fillStyle = "#0ff";
                    ctx.beginPath(); ctx.moveTo(p.x, p.y - 5); ctx.lineTo(p.x + 5, p.y); ctx.lineTo(p.x, p.y + 5); ctx.lineTo(p.x - 5, p.y); ctx.fill();
                } else {
                    ctx.fillStyle = p.type === 'x2' ? "#0ff" : (p.type === '-2' ? "#f00" : "#f0f");
                    ctx.font = "bold 16px 'Courier New'";
                    ctx.textAlign = "center";
                    ctx.fillText(p.type, p.x, p.y);
                }

                if (Math.hypot(player.x - p.x, player.y - p.y) < 40) {
                    if (p.type === '+100') {
                        coins += 100;
                    } else if (p.type === '-2') {
                        if (wingmen.length > 0) wingmen.splice(-Math.min(2, wingmen.length));
                    } else if (p.type === 'x2') {
                        let currentCount = wingmen.length;
                        purchasedWingmenCount += currentCount;
                        for (let w = 0; w < currentCount; w++) {
                            let c = wingmen.length;
                            let offset = (Math.floor(c / 2) + 1) * 60;
                            let sign = (c % 2 === 0) ? -1 : 1;
                            let hOffset = 20 + Math.floor(c / 2) * 20;
                            wingmen.push({ dx: offset * sign, dy: hOffset, hp: player.ship.hp });
                        }
                    } else if (p.type === 'gem') {
                        coins += 5; // Extra bonus for catching the visual gems
                    }
                    powerups.splice(i, 1);
                    updateUI();
                } else if (p.y > canvas.height + 20) { powerups.splice(i, 1); }
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx; p.y += p.vy; p.life--;
                ctx.fillStyle = p.color; ctx.globalAlpha = p.life / 30; ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI * 2); ctx.fill();
                ctx.globalAlpha = 1.0; if (p.life <= 0) particles.splice(i, 1);
            }

            drawDetailedJet(player.x, player.y, player.ship, true, false);
            for (let wm of wingmen) {
                ctx.globalAlpha = 0.5;
                drawDetailedJet(player.x + wm.dx, player.y + wm.dy, player.ship, true, false);
            }
            ctx.globalAlpha = 1.0;
            requestAnimationFrame(update);
        }

        function gameOver() {
            isGameOver = true;
            document.getElementById('respawnScreen').style.display = 'flex';
        }

        window.respawn = function () {
            player.hp = player.ship.hp + upgrades.hpBonus;
            player.x = canvas.width / 2;
            player.y = canvas.height - 100;
            bullets = [];
            enemies = [];
            enemyBullets = [];
            particles = [];
            powerups = [];
            wingmen = [
                { dx: -60, dy: 20, hp: 100, bulletSpeed: 10 },
                { dx: 60, dy: 20, hp: 100, bulletSpeed: 10 }
            ];
            for (let i = 0; i < purchasedWingmenCount; i++) {
                let offset = (Math.floor(i / 2) + 1) * 60;
                let sign = (i % 2 === 0) ? -1 : 1;
                let hOffset = 20 + Math.floor(i / 2) * 20;
                wingmen.push({ dx: offset * sign, dy: hOffset, hp: player.ship.hp + upgrades.hpBonus });
            }

            isGameOver = false;
            document.getElementById('respawnScreen').style.display = 'none';
            updateUI();
            update(); // Restart loop
        }

        window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });

        initShop();
        update();

    </script>
</body>

</html>
