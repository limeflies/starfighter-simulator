<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starfighter Combat</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            color: #ffe81f;
            font-family: 'Courier New', Courier, monospace;

            #threeCanvas {
                position: absolute;
                top: 0;
                left: 0;
                width: 100vw;
                height: 100vh;
                z-index: 0;
                background: linear-gradient(to bottom, #1a75d1, #7ec0ee, #cceeff);
                pointer-events: none;
                display: block;
            }

            #gameCanvas {
                position: absolute;
                top: 0;
                left: 0;
                width: 100vw;
                height: 100vh;
                z-index: 1;
                background: transparent;
                pointer-events: auto;
                display: block;
            }

            #ui {
                position: absolute;
                top: 20px;
                left: 20px;
                font-size: uiououio;
                text-shadow: 2px 2px 0 #000;
            }

            #shop {
                position: absolute;
                top: 0;
                right: 0;
                background: rgba(20, 20, 20, 0.9);
                border-left: 2px solid #ffe81f;
                padding: 15px;
                text-align: center;
                width: 280px;
                height: 100vh;
                max-height: 100vh;
                overflow-y: auto;
                box-sizing: border-box;
            }

            .shop-item {
                border-bottom: 1px solid #555;
                padding: 10px 0;
                display: flex;
                flex-direction: column;
                align-items: center;
            }

            .shop-item:last-child {
                border-bottom: none;
            }

            .shop-item h4 {
                margin: 0 0 5px 0;
                color: #fff;
                font-size: 16px;
            }

            .shop-item p {
                margin: 0 0 10px 0;
                font-size: 14px;
                color: #aaa;
            }

            button {
                background: #000;
                color: #ffe81f;
                border: 1px solid #ffe81f;
                padding: 8px 15px;
                cursor: pointer;
                font-family: inherit;
                font-weight: bold;
                transition: all 0.2s;
                width: 100%;
            }

            button:hover:not(:disabled) {
                background: #ffe81f;
                color: #000;
            }

            button:disabled {
                border-color: #555;
                color: #555;
                cursor: not-allowed;
            }

            #respawnScreen {
                position: absolute;
                top: 0;
                left: 0;
                width: 100vw;
                height: 100vh;
                background: rgba(0, 0, 0, 0.8);
                display: none;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                z-index: 100;
            }

            #respawnScreen h1 {
                font-size: 60px;
                color: #f00;
                margin-bottom: 20px;
            }

            #respawnScreen button {
                font-size: 24px;
                padding: 15px 30px;
                width: auto;
            }

            /* Custom Scrollbar */
            ::-webkit-scrollbar {
                width: 8px;
            }

            ::-webkit-scrollbar-track {
                background: #111;
            }

            ::-webkit-scrollbar-thumb {
                background: #ffe81f;
            }

            ::-webkit-scrollbar-thumb:hover {
                background: #fff;
            }

            #baseUI {
                position: absolute;
                top: 0;
                left: 0;
                width: 100vw;
                height: 100vh;
                background: rgba(10, 10, 20, 0.95);
                display: none;
                flex-direction: column;
                align-items: center;
                padding-top: 50px;
                z-index: 50;
            }

            #treeContainer {
                display: flex;
                flex-wrap: wrap;
                gap: 15px;
                justify-content: center;
                max-width: 900px;
                max-height: 60vh;
                overflow-y: auto;
                padding: 20px;
            }

            .tech-node {
                background: #222;
                border: 2px solid #555;
                padding: 10px;
                width: 160px;
                text-align: center;
                border-radius: 8px;
                position: relative;
            }

            .tech-node.unlocked {
                border-color: #0f0;
                background: #040;
            }

            .tech-node.available {
                border-color: #0ff;
                cursor: pointer;
            }

            .tech-node.available:hover {
                background: #044;
            }

            .tech-node.locked {
                opacity: 0.5;
            }

            .tech-node h4 {
                margin: 0 0 5px 0;
                color: #fff;
                font-size: 14px;
            }

            .tech-node p {
                margin: 0;
                font-size: 12px;
                color: #ccc;
            }

            #controls {
                position: absolute;
                bottom: 20px;
                left: 20px;
                display: flex;
                flex-direction: column;
                gap: 10px;
                z-index: 10;
            }

            #bossUI {
                position: absolute;
                top: 20px;
                left: 50%;
                transform: translateX(-50%);
                width: 400px;
                text-align: center;
                display: none;
            }

            #bossBar {
                width: 100%;
                height: 20px;
                background: #333;
                border: 2px solid #f00;
                margin-top: 5px;
            }

            #bossFill {
                width: 100%;
                height: 100%;
                background: #f00;
                transition: width 0.2s;
            }

            #warning {
                position: absolute;
                top: 30%;
                left: 50%;
                transform: translate(-50%, -50%);
                font-size: 60px;
                color: #f00;
                display: none;
                z-index: 100;
                text-shadow: 0 0 10px #f00;
            }
    </style>
</head>

<body>

    <div id="ui">
        <div>Level: <span id="levelVal">1</span> | Next Boss: <span id="timerVal">05:00</span></div>
        <div>Score: <span id="scoreVal">0</span></div>
        <div>Kills: <span id="killVal">0</span></div>
        <div>Credits: <span id="coinVal">0</span> | Gems: <span id="gemVal">0</span></div>
        <div>Hull Integrity: <span id="hpVal">100</span>%</div>
        <button onclick="toggleBase()" style="margin-top:10px; border-color:#0ff; color:#0ff;">UPGRADES</button>
    </div>

    <div id="shop">
        <h3>Hangar (Shop)</h3>
        <p>Current: <span id="currentShip">T-65 X-Wing</span></p>
        <div id="shopList"></div>
    </div>

    <div id="respawnScreen">
        <h1>SHIP DESTROYED</h1>
        <button onclick="respawn()">RESPAWN</button>
    </div>

    <div id="controls">
        <button onclick="restartGame()">RESTART</button>
        <button onclick="togglePause()" id="pauseBtn">PAUSE</button>
    </div>

    <div id="bossUI">
        <h2 style="color:#f00; margin:0;">BOSS ACTIVE</h2>
        <div id="bossBar">
            <div id="bossFill"></div>
        </div>
    </div>

    <div id="warning">WARNING: BOSS APPROACHING</div>

    <div id="baseUI">
        <h1 style="color:#0ff; margin-bottom:0;">AIRCRAFT UPGRADE TREE</h1>
        <h2 style="margin-top:5px;">Gems Available: <span id="baseGemVal">0</span></h2>
        <div id="treeContainer"></div>
        <button onclick="toggleBase()"
            style="margin-top: 20px; width: 200px; border-color:#0ff; color:#0ff;">BATTLE</button>
    </div>

    <canvas id="threeCanvas"></canvas>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // --- Three.js 3D WebGL Flight Simulator Engine ---
        let scene, camera, renderer, cloudsGroup;
        const meshMap = new Map();
        let playerGroup = null;
        let wingmenGroups = [];

        function initThree() {
            const container = document.getElementById('threeCanvas');
            scene.background = new THREE.Color(0x87ceeb); // Bright daytime sky
            scene.fog = new THREE.FogExp2(0x87ceeb, 0.0015); // Matching fog to blend horizon

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 2000);
            camera.position.set(0, 320, 240); // Shorter lens perspective chase cam
            camera.lookAt(0, 0, -180);

            renderer = new THREE.WebGLRenderer({ canvas: container, antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

            // Realistic Daytime Lighting
            const ambientLight = new THREE.AmbientLight(0xdff0ff, 0.85); // Soft blue sky reflection
            scene.add(ambientLight);

            const sunLight = new THREE.DirectionalLight(0xfffaed, 1.6); // Warm golden sun
            sunLight.position.set(300, 600, 100);
            scene.add(sunLight);

            const pointLight = new THREE.PointLight(0xff7700, 0.8, 250); // Subtle afterburner reflection
            pointLight.position.set(0, 10, 100);
            scene.add(pointLight);

            // Procedural Volumetric 3D Clouds
            cloudsGroup = new THREE.Group();
            scene.add(cloudsGroup);

            const cloudMat = new THREE.MeshLambertMaterial({
                color: 0xffffff,
                transparent: true,
                opacity: 0.9,
                flatShading: true
            });

            // Generate 35 distinct 3D cloud clusters scattered at various layers
            for (let i = 0; i < 35; i++) {
                const cloudCluster = new THREE.Group();
                
                // Construct a cluster of intersecting spheres
                const bubbleCount = 6 + Math.floor(Math.random() * 5);
                for (let j = 0; j < bubbleCount; j++) {
                    const radius = 15 + Math.random() * 20;
                    const sphereGeom = new THREE.SphereGeometry(radius, 7, 7);
                    const bubble = new THREE.Mesh(sphereGeom, cloudMat);
                    
                    // random spherical offsets
                    bubble.position.set(
                        (Math.random() - 0.5) * 45,
                        (Math.random() - 0.5) * 15,
                        (Math.random() - 0.5) * 45
                    );
                    cloudCluster.add(bubble);
                }

                // Scatter clouds in 3D space
                // Float some high above the combat plane (Y=50), most below (Y=-30) for a flight over clouds feel
                const heightY = (Math.random() > 0.6) ? 50 + Math.random() * 30 : -20 - Math.random() * 40;
                cloudCluster.position.set(
                    (Math.random() - 0.5) * 1200,
                    heightY,
                    (Math.random() - 0.5) * 1200
                );
                
                // subtle random rotation for natural look
                cloudCluster.rotation.y = Math.random() * Math.PI;
                cloudsGroup.add(cloudCluster);
            }
        }

        const to3D = (x, y) => {
            let x3d = (x - canvas.width / 2) * 0.55;
            let z3d = (y - canvas.height / 2) * 0.55;
            return { x: x3d, y: 10, z: z3d };
        };

        function create3DJet(shipId, colorHex, isPlayer) {
            const group = new THREE.Group();
            const color = new THREE.Color(colorHex || "#888888");

            const hullMat = new THREE.MeshStandardMaterial({
                color: color,
                roughness: 0.35,
                metalness: 0.75,
                flatShading: true
            });

            const canopyMat = new THREE.MeshStandardMaterial({
                color: isPlayer ? 0x00ffff : 0xff3300,
                roughness: 0.1,
                metalness: 0.9,
                transparent: true,
                opacity: 0.65
            });

            const thrusterMat = new THREE.MeshBasicMaterial({
                color: shipId === 23 ? 0x00ffff : 0xffaa00,
                transparent: true,
                opacity: 0.9
            });

            const darkMat = new THREE.MeshStandardMaterial({
                color: 0x1a1a1a,
                roughness: 0.6,
                metalness: 0.4
            });

            let fuseLen = 32;
            let fuseRadius = 2.5;
            if (shipId === 17 || shipId === 23) {
                fuseLen = 42;
                fuseRadius = 1.8;
            } else if (shipId === 8) {
                fuseLen = 28;
                fuseRadius = 3.2;
            }

            const fuseGeom = new THREE.CylinderGeometry(0.1, fuseRadius, fuseLen, 8);
            fuseGeom.rotateX(Math.PI / 2);
            const fuselage = new THREE.Mesh(fuseGeom, hullMat);
            group.add(fuselage);

            const canopyGeom = new THREE.SphereGeometry(1.5, 8, 8);
            canopyGeom.scale(1, 1.2, 3);
            const canopy = new THREE.Mesh(canopyGeom, canopyMat);
            canopy.position.set(0, 1.8, -fuseLen * 0.15);
            group.add(canopy);

            const wingShape = new THREE.Shape();
            wingShape.moveTo(0, 0);

            switch (shipId) {
                case 0:
                    for (let angle of [-0.25, 0.25, Math.PI - 0.25, Math.PI + 0.25]) {
                        const xwingGeom = new THREE.BoxGeometry(20, 0.4, 6);
                        const xwing = new THREE.Mesh(xwingGeom, hullMat);
                        xwing.position.set(Math.cos(angle) * 10, Math.sin(angle) * 5, 2);
                        xwing.rotation.z = angle * 0.5;

                        const stripeGeom = new THREE.BoxGeometry(2, 0.5, 6.1);
                        const stripe = new THREE.Mesh(stripeGeom, new THREE.MeshBasicMaterial({ color: 0xcc3333 }));
                        stripe.position.set(Math.cos(angle) * 8, 0, 0);
                        xwing.add(stripe);

                        const cannonGeom = new THREE.CylinderGeometry(0.2, 0.2, 12, 4);
                        cannonGeom.rotateX(Math.PI / 2);
                        const cannon = new THREE.Mesh(cannonGeom, darkMat);
                        cannon.position.set(Math.cos(angle) * 9, 0, -4);
                        xwing.add(cannon);

                        group.add(xwing);
                    }
                    break;

                case 1:
                default:
                    wingShape.lineTo(-24, 6);
                    wingShape.lineTo(-22, 10);
                    wingShape.lineTo(0, 4);
                    break;

                case 2:
                    wingShape.lineTo(-26, 8);
                    wingShape.lineTo(-24, 11);
                    wingShape.lineTo(0, 5);

                    for (let side of [-1, 1]) {
                        const tailGeom = new THREE.BoxGeometry(0.3, 8, 5);
                        const tail = new THREE.Mesh(tailGeom, hullMat);
                        tail.position.set(side * 3, 4, 10);
                        tail.rotation.z = side * 0.15;
                        tail.rotation.y = -side * 0.05;
                        group.add(tail);
                    }
                    break;

                case 3:
                    const wedgeL = new THREE.Mesh(new THREE.BoxGeometry(8, 2, 18), new THREE.MeshStandardMaterial({ color: 0xcc3333, metalness: 0.8 }));
                    wedgeL.position.set(-6, 0, 2);
                    group.add(wedgeL);
                    const wedgeR = wedgeL.clone();
                    wedgeR.position.x = 6;
                    group.add(wedgeR);

                    for (let side of [-1, 1]) {
                        const fin = new THREE.Mesh(new THREE.BoxGeometry(0.4, 7, 5), hullMat);
                        fin.position.set(side * 8, 3.5, 8);
                        group.add(fin);
                    }
                    break;

                case 4:
                    const strutL = new THREE.Mesh(new THREE.BoxGeometry(10, 1, 2), darkMat);
                    strutL.position.set(-6, 0, 2);
                    group.add(strutL);
                    const strutR = strutL.clone();
                    strutR.position.x = 6;
                    group.add(strutR);

                    for (let side of [-1, 1]) {
                        const nacelle = new THREE.Mesh(new THREE.CylinderGeometry(2, 2.2, 34, 8), hullMat);
                        nacelle.rotation.x = Math.PI / 2;
                        nacelle.position.set(side * 11, 0, 1);

                        const ring = new THREE.Mesh(new THREE.CylinderGeometry(2.1, 2.1, 3, 8), new THREE.MeshBasicMaterial({ color: 0xffaa00 }));
                        ring.position.y = -14;
                        nacelle.add(ring);

                        group.add(nacelle);
                    }
                    break;

                case 5:
                    wingShape.lineTo(-28, 5);
                    wingShape.lineTo(-25, 12);
                    wingShape.lineTo(0, 8);

                    for (let side of [-1, 1]) {
                        const tail = new THREE.Mesh(new THREE.BoxGeometry(0.3, 9, 6), hullMat);
                        tail.position.set(side * 3.5, 4.5, 10);
                        group.add(tail);
                    }
                    break;

                case 6:
                    wingShape.lineTo(-28, 0);
                    wingShape.lineTo(-14, 12);
                    wingShape.lineTo(0, 9);

                    for (let side of [-1, 1]) {
                        const fin = new THREE.Mesh(new THREE.BoxGeometry(0.3, 8.5, 7), hullMat);
                        fin.position.set(side * 4.2, 4.2, 9);
                        fin.rotation.z = side * 0.35;
                        group.add(fin);
                    }
                    break;

                case 7:
                    wingShape.lineTo(-25, -2);
                    wingShape.lineTo(-12, 10);
                    wingShape.lineTo(0, 8);

                    for (let side of [-1, 1]) {
                        const fin = new THREE.Mesh(new THREE.BoxGeometry(0.3, 7.5, 6), hullMat);
                        fin.position.set(side * 3.2, 4, 8);
                        fin.rotation.z = side * 0.35;
                        group.add(fin);
                    }
                    break;

                case 8:
                    wingShape.lineTo(-32, 0);
                    wingShape.lineTo(-32, 7);
                    wingShape.lineTo(0, 7);

                    for (let side of [-1, 1]) {
                        const engine = new THREE.Mesh(new THREE.CylinderGeometry(2.4, 2.4, 11, 8), darkMat);
                        engine.rotation.x = Math.PI / 2;
                        engine.position.set(side * 4, 3.8, 6);
                        group.add(engine);
                    }

                    const stab = new THREE.Mesh(new THREE.BoxGeometry(22, 0.4, 4), hullMat);
                    stab.position.set(0, 0, 12);
                    group.add(stab);
                    for (let side of [-1, 1]) {
                        const fin = new THREE.Mesh(new THREE.BoxGeometry(0.3, 7, 5), hullMat);
                        fin.position.set(side * 11, 3, 12);
                        group.add(fin);
                    }
                    break;

                case 9:
                    wingShape.quadraticCurveTo(-12, -4, -28, 8);
                    wingShape.lineTo(-24, 13);
                    wingShape.lineTo(0, 8);

                    for (let side of [-1, 1]) {
                        const fin = new THREE.Mesh(new THREE.BoxGeometry(0.3, 9, 6), hullMat);
                        fin.position.set(side * 3.5, 4.5, 10);
                        group.add(fin);
                    }
                    break;

                case 10:
                    wingShape.lineTo(-25, 4);
                    wingShape.lineTo(-21, 9);
                    wingShape.lineTo(0, 6);

                    for (let side of [-1, 1]) {
                        const fin = new THREE.Mesh(new THREE.BoxGeometry(0.3, 8, 6), hullMat);
                        fin.position.set(side * 3, 4, 8);
                        group.add(fin);
                    }
                    break;

                case 11:
                    wingShape.lineTo(-26, 12);
                    wingShape.lineTo(-24, 15);
                    wingShape.lineTo(0, 12);

                    const canardL = new THREE.Mesh(new THREE.BoxGeometry(8, 0.2, 3), hullMat);
                    canardL.position.set(-6, 0.5, -10);
                    canardL.rotation.y = 0.2;
                    group.add(canardL);
                    const canardR = canardL.clone();
                    canardR.position.x = 6;
                    canardR.rotation.y = -0.2;
                    group.add(canardR);
                    break;

                case 12:
                    wingShape.lineTo(-25, 10);
                    wingShape.lineTo(-22, 13);
                    wingShape.lineTo(0, 10);

                    const rafCanL = new THREE.Mesh(new THREE.BoxGeometry(7, 0.2, 3.5), hullMat);
                    rafCanL.position.set(-5.5, 0.5, -8);
                    group.add(rafCanL);
                    const rafCanR = rafCanL.clone();
                    rafCanR.position.x = 5.5;
                    group.add(rafCanR);
                    break;

                case 13:
                    wingShape.lineTo(-22, 9);
                    wingShape.lineTo(-19, 11);
                    wingShape.lineTo(0, 8);

                    const gripCanL = new THREE.Mesh(new THREE.BoxGeometry(6, 0.2, 2.5), hullMat);
                    gripCanL.position.set(-4.5, 0.4, -7);
                    group.add(gripCanL);
                    const gripCanR = gripCanL.clone();
                    gripCanR.position.x = 4.5;
                    group.add(gripCanR);
                    break;

                case 14:
                    const blade = new THREE.Mesh(new THREE.BoxGeometry(1, 32, 6), new THREE.MeshStandardMaterial({ color: 0x3333cc }));
                    group.add(blade);
                    const cross = new THREE.Mesh(new THREE.BoxGeometry(28, 0.6, 2), darkMat);
                    cross.position.set(0, -10, 0);
                    group.add(cross);
                    break;

                case 15:
                    const tiePod = new THREE.Mesh(new THREE.SphereGeometry(4, 16, 16), hullMat);
                    group.add(tiePod);

                    const barL = new THREE.Mesh(new THREE.CylinderGeometry(0.8, 0.8, 16, 6), darkMat);
                    barL.rotation.z = Math.PI / 2;
                    barL.position.set(-8, 0, 0);
                    group.add(barL);
                    const barR = barL.clone();
                    barR.position.x = 8;
                    group.add(barR);

                    for (let side of [-1, 1]) {
                        const panel = new THREE.Mesh(new THREE.BoxGeometry(0.4, 28, 22), darkMat);
                        panel.position.set(side * 16, 0, 0);
                        const frame = new THREE.Mesh(new THREE.BoxGeometry(0.5, 29, 2), hullMat);
                        panel.add(frame);
                        group.add(panel);
                    }
                    break;

                case 16:
                    const intPod = new THREE.Mesh(new THREE.SphereGeometry(3.8, 16, 16), hullMat);
                    group.add(intPod);

                    const intBarL = new THREE.Mesh(new THREE.CylinderGeometry(0.7, 0.7, 14, 6), darkMat);
                    intBarL.rotation.z = Math.PI / 2;
                    intBarL.position.set(-7, 0, 0);
                    group.add(intBarL);
                    const intBarR = intBarL.clone();
                    intBarR.position.x = 7;
                    group.add(intBarR);

                    for (let side of [-1, 1]) {
                        const panel = new THREE.Group();
                        panel.position.set(side * 14, 0, 0);
                        const intShape = new THREE.Shape();
                        intShape.moveTo(0, 14);
                        intShape.lineTo(-12, 0);
                        intShape.lineTo(0, -14);
                        intShape.lineTo(-4, 0);
                        const intGeom = new THREE.ExtrudeGeometry(intShape, { depth: 0.5, bevelEnabled: false });
                        intGeom.rotateY(Math.PI / 2 * side);
                        const panelMesh = new THREE.Mesh(intGeom, darkMat);
                        panel.add(panelMesh);
                        group.add(panel);
                    }
                    break;

                case 17:
                    const chineGeom = new THREE.CylinderGeometry(0.1, 4, 36, 8);
                    chineGeom.scale(2.5, 0.3, 1);
                    chineGeom.rotateX(Math.PI / 2);
                    const chine = new THREE.Mesh(chineGeom, darkMat);
                    group.add(chine);

                    wingShape.lineTo(-18, 12);
                    wingShape.lineTo(-14, 16);
                    wingShape.lineTo(0, 10);

                    for (let side of [-1, 1]) {
                        const engine = new THREE.Mesh(new THREE.CylinderGeometry(2, 2.2, 25, 8), darkMat);
                        engine.rotation.x = Math.PI / 2;
                        engine.position.set(side * 10, 0, 4);
                        const exRing = new THREE.Mesh(new THREE.CylinderGeometry(1.8, 1.8, 1, 8), thrusterMat);
                        exRing.position.y = 12.5;
                        engine.add(exRing);
                        group.add(engine);
                    }
                    break;

                case 18:
                    const b2Shape = new THREE.Shape();
                    b2Shape.moveTo(0, -12);
                    b2Shape.lineTo(36, 12);
                    b2Shape.lineTo(18, 12);
                    b2Shape.lineTo(12, 8);
                    b2Shape.lineTo(6, 14);
                    b2Shape.lineTo(0, 8);
                    b2Shape.lineTo(-6, 14);
                    b2Shape.lineTo(-12, 8);
                    b2Shape.lineTo(-18, 12);
                    b2Shape.lineTo(-36, 12);

                    const b2Geom = new THREE.ExtrudeGeometry(b2Shape, { depth: 1.8, bevelEnabled: true, bevelThickness: 0.2 });
                    b2Geom.rotateX(Math.PI / 2);
                    const b2 = new THREE.Mesh(b2Geom, darkMat);
                    group.add(b2);
                    break;

                case 19:
                    const saucer = new THREE.Mesh(new THREE.CylinderGeometry(14, 14, 3, 16), hullMat);
                    saucer.rotation.x = Math.PI / 2;
                    group.add(saucer);
                    const mandibleL = new THREE.Mesh(new THREE.BoxGeometry(4, 3, 14), hullMat);
                    mandibleL.position.set(-5, 0, -14);
                    group.add(mandibleL);
                    const mandibleR = mandibleL.clone();
                    mandibleR.position.x = 5;
                    group.add(mandibleR);

        // Detailed top-down pseudo-3D flight rendering engine
        function drawDetailedJet(x, y, ship, isPlayer, isEnemy = false) {
            ctx.save();
            ctx.translate(x, y);

            // If it's an enemy, scale y by -1 to face down
            if (isEnemy) {
                ctx.scale(1, -1);
            }

            let scale = isPlayer ? 1.0 : 0.75;
            ctx.scale(scale, scale);

            let color = ship.color || "#888";
            let cockpitColor = isPlayer ? "#0ff" : "#f50";

            // 3D Altitude Drop Shadow
            ctx.save();
            ctx.translate(10, 15 * (isEnemy ? -1 : 1));
            ctx.fillStyle = "rgba(0, 0, 0, 0.35)";
            ctx.beginPath();
            ctx.moveTo(0, -25);
            ctx.lineTo(25, 15);
            ctx.lineTo(5, 20);
            ctx.lineTo(0, 25);
            ctx.lineTo(-5, 20);
            ctx.lineTo(-25, 15);
            ctx.closePath();
            ctx.fill();
            ctx.restore();

            // Glowing engine exhaust flame (pulsing)
            let flameLen = 12 + Math.sin(gameFrames * 0.5) * 4;
            let exhaustY = 22; // rear of the jet
            let exhaustGlow = ctx.createRadialGradient(0, exhaustY, 2, 0, exhaustY + flameLen, 8);
            if (ship.id === 23) {
                // SR-72 Hypersonic scramjet glow (Bright Cyan/Blue)
                exhaustGlow.addColorStop(0, "#fff");
                exhaustGlow.addColorStop(0.3, "#0bf");
                exhaustGlow.addColorStop(0.7, "#00f");
                exhaustGlow.addColorStop(1, "rgba(0, 0, 255, 0)");
            } else {
                // Regular military amber/orange thruster flame
                exhaustGlow.addColorStop(0, "#fff");
                exhaustGlow.addColorStop(0.3, "#ff5");
                exhaustGlow.addColorStop(0.7, "#f50");
                exhaustGlow.addColorStop(1, "rgba(255, 80, 0, 0)");
            }
            ctx.fillStyle = exhaustGlow;
            ctx.beginPath();
            ctx.moveTo(-6, exhaustY);
            ctx.lineTo(0, exhaustY + flameLen);
            ctx.lineTo(6, exhaustY);
            ctx.closePath();
            ctx.fill();

            // Fuselage metallic 3D gradient

        function update() {
            if (isGameOver) return;
            if (isPaused || gameState === 'base') {
                requestAnimationFrame(update);
                return;
            }

            gameFrames++;
            if (gameFrames % 60 === 0) updateUI(); // Update timer every second

            if (!bossActive && levelKills >= 30) {
                bossActive = true;
                bossWarningTimer = 0;
                let isMegaVillain = (level % 10 === 0);
                let multiplier = isMegaVillain ? 5 : 1;
                boss = { x: canvas.width / 2, y: -100, hp: 1000 * Math.pow(1.5, level - 1) * multiplier, maxHp: 1000 * Math.pow(1.5, level - 1) * multiplier, speed: isMegaVillain ? 1 : 2, dir: 1, type: isMegaVillain ? 'mega' : level % 3 };
                document.getElementById('bossUI').style.display = 'block';
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            let pSpeed = player.ship.speed + upgrades.speedBonus;
            if (keys.w && player.y > 20) player.y -= pSpeed;
            if (keys.s && player.y < canvas.height - 30) player.y += pSpeed;
            if (keys.a && player.x > 20) player.x -= pSpeed;
            if (keys.d && player.x < canvas.width - 20) player.x += pSpeed;

            if (player.cooldown > 0) player.cooldown--;
            if (keys.space && player.cooldown === 0) {
                let pBulletSpeed = 7;
                if (player.ship.fireRate < 10) {
                    bullets.push({ x: player.x - 10, y: player.y - 20, speed: pBulletSpeed, width: 4, height: 15, color: player.ship.bulletColor });
                    bullets.push({ x: player.x + 10, y: player.y - 20, speed: pBulletSpeed, width: 4, height: 15, color: player.ship.bulletColor });
                } else {
                    bullets.push({ x: player.x, y: player.y - 25, speed: pBulletSpeed, width: 3, height: 15, color: player.ship.bulletColor });
                }
                wingmen.forEach(wm => {
                    bullets.push({ x: player.x + wm.dx, y: player.y + wm.dy - 20, speed: pBulletSpeed, width: 3, height: 15, color: player.ship.bulletColor });
                });

                if (upgrades.missiles) {
                    bullets.push({ x: player.x, y: player.y, speed: upgrades.missileSpeed, width: 6, height: 12, color: "#f80", isMissile: true });
                }

                player.cooldown = Math.max(2, player.ship.fireRate - upgrades.fireRateBonus);
            }

            for (let i = bullets.length - 1; i >= 0; i--) {
                let b = bullets[i];

                if (b.isMissile && enemies.length > 0) {
                    let target = enemies[0];
                    let minDist = Infinity;
                    enemies.forEach(e => {
                        let d = Math.hypot(e.x - b.x, e.y - b.y);
                        if (d < minDist) { minDist = d; target = e; }
                    });
                    if (target.x < b.x) b.x -= 2;
                    if (target.x > b.x) b.x += 2;
                }

                b.y -= b.speed;
                ctx.fillStyle = b.color; ctx.shadowBlur = 10; ctx.shadowColor = b.color;
                ctx.fillRect(b.x - b.width / 2, b.y, b.width, b.height); ctx.shadowBlur = 0;
                if (b.y < -20) bullets.splice(i, 1);
            }

            if (!bossActive || bossWarningTimer > 0) {
                spawnEnemy();
            }
            if (bossWarningTimer > 0) bossWarningTimer--;

            for (let i = enemies.length - 1; i >= 0; i--) {
                let e = enemies[i];
                e.y += e.speed;
                drawEnemy(e);

                let eType = e.eData;
                if (!eType) continue; // skip if somehow no data

                if (Math.random() < eType.shootChance * Math.pow(1.6, level - 1)) {
                    if (eType.bullets === 1) {
                        enemyBullets.push({ x: e.x, y: e.y + 10, speed: 7, width: 4, height: 15, color: eType.color });
                    } else if (eType.bullets === 2) {
                        enemyBullets.push({ x: e.x - 10, y: e.y + 10, speed: 7, width: 4, height: 15, color: eType.color });
                        enemyBullets.push({ x: e.x + 10, y: e.y + 10, speed: 7, width: 4, height: 15, color: eType.color });
                    } else {
                        // Spread shot for 3+ bullets
                        for (let b = 0; b < eType.bullets; b++) {
                            let spread = (b - (eType.bullets - 1) / 2) * 10;
                            enemyBullets.push({ x: e.x + spread, y: e.y + 10, speed: 7, width: 4, height: 15, color: eType.color });
                        }
                    }
                }

                for (let j = bullets.length - 1; j >= 0; j--) {
                    let b = bullets[j];
                    if (b.x > e.x - 20 && b.x < e.x + 20 && b.y > e.y - 15 && b.y < e.y + 15) {
                        e.hp -= 10; bullets.splice(j, 1); createExplosion(b.x, b.y, "#f80");
                        if (e.hp <= 0) {
                            score += eType.score;
                            kills++;
                            levelKills++;

                            if (kills % 1000 === 0 && kills > 0) {
                                if (!ownedShips.includes(23)) {
                                    ownedShips.push(23); // Unlock Legendary Jet
                                }
                            }

                            if (Math.random() < 0.25) { // 1 in 4 kills
                                powerups.push({ x: e.x, y: e.y, speed: 2, type: '-2' });
                            }

                            createExplosion(e.x, e.y, "#f00");
                            if (kills % 200 === 0 && kills > 0) {
                                if (Math.random() < 0.5) powerups.push({ x: e.x, y: e.y, speed: 2, type: 'x2' });
                                else powerups.push({ x: e.x, y: e.y, speed: 2, type: '+100' });
                            } else if (Math.random() < Math.max(0.1, 0.5 - (level - 1) * 0.1)) {
                                droppedCoins.push({ x: e.x, y: e.y, speed: 2 });
                            }
                            enemies.splice(i, 1);
                            updateUI();
                        }
                        break;
                    }
                }
                if (e.y > canvas.height + 20) enemies.splice(i, 1);
            }

            if (boss) {
                if (boss.y < 100) boss.y += 1;
                boss.x += boss.speed * boss.dir;

                let hitBoxW = boss.type === 'mega' ? 150 : 80;
                let hitBoxH = boss.type === 'mega' ? 100 : 60;

                if (boss.x < hitBoxW || boss.x > canvas.width - hitBoxW) boss.dir *= -1;

                drawContraBoss(ctx, boss);

                document.getElementById('bossFill').style.width = (boss.hp / boss.maxHp * 100) + '%';

                let bossFireRate = (boss.type === 'mega' ? 0.2 : 0.05) * Math.pow(1.6, level - 1);
                if (Math.random() < bossFireRate) {
                    if (boss.type === 'mega') {
                        for (let b = 0; b < 5; b++) {
                            let spread = (b - 2) * 30;
                            enemyBullets.push({ x: boss.x + spread, y: boss.y + 60, speed: 15, width: 8, height: 20, color: "#f00" });
                        }
                    } else {
                        enemyBullets.push({ x: boss.x - 45, y: boss.y + 40, speed: 20, width: 6, height: 15, color: "#fa0" });
                        enemyBullets.push({ x: boss.x + 45, y: boss.y + 40, speed: 20, width: 6, height: 15, color: "#fa0" });
                    }
                }

                for (let j = bullets.length - 1; j >= 0; j--) {
                    let b = bullets[j];
                    if (b.x > boss.x - hitBoxW && b.x < boss.x + hitBoxW && b.y > boss.y - hitBoxH && b.y < boss.y + hitBoxH) {
                        boss.hp -= 10; bullets.splice(j, 1); createExplosion(b.x, b.y, "#ff0");
                        if (boss.hp <= 0) {
                            score += 500 * level;
                            let gemReward = Math.floor(score / 50);
                            gems += gemReward;

                            for (let g = 0; g < 20; g++) {
                                powerups.push({ x: boss.x + (Math.random() - 0.5) * 100, y: boss.y + (Math.random() - 0.5) * 100, speed: Math.random() * 2 + 1, type: 'gem' });
                            }

                            createExplosion(boss.x, boss.y, "#fff");
                            createExplosion(boss.x - 30, boss.y, "#fff");
                            createExplosion(boss.x + 30, boss.y, "#fff");
                            boss = null;
                            bossActive = false;
                            document.getElementById('bossUI').style.display = 'none';
                            level++;
                            levelKills = 0;
                            gameFrames = 0;
                            updateUI();
                        }
                        break;
                    }
                }
            }

            for (let i = enemyBullets.length - 1; i >= 0; i--) {
                let eb = enemyBullets[i];
                eb.y += eb.speed;

                if (eb.isPlasma) {
                    ctx.fillStyle = eb.color; ctx.shadowBlur = 10; ctx.shadowColor = eb.color;
                    ctx.beginPath(); ctx.arc(eb.x, eb.y, eb.width / 2, 0, Math.PI * 2); ctx.fill(); ctx.shadowBlur = 0;
                } else {
                    ctx.fillStyle = eb.color; ctx.shadowBlur = 10; ctx.shadowColor = eb.color;
                    ctx.fillRect(eb.x - eb.width / 2, eb.y, eb.width, eb.height); ctx.shadowBlur = 0;
                }

                if (eb.x > player.x - player.width / 2 && eb.x < player.x + player.width / 2 && eb.y > player.y - player.height / 2 && eb.y < player.y + player.height / 2) {
                    player.hp -= 10; enemyBullets.splice(i, 1); createExplosion(player.x, player.y, "#f00"); updateUI();
                    if (player.hp <= 0) gameOver();
                } else {
                    let hitWingman = false;
                    for (let w = wingmen.length - 1; w >= 0; w--) {
                        let wm = wingmen[w];
                        let wx = player.x + wm.dx;
                        let wy = player.y + wm.dy;
                        if (eb.x > wx - player.width / 2 && eb.x < wx + player.width / 2 && eb.y > wy - player.height / 2 && eb.y < wy + player.height / 2) {
                            wm.hp -= 10; hitWingman = true; enemyBullets.splice(i, 1); createExplosion(wx, wy, "#f00");
                            if (wm.hp <= 0) wingmen.splice(w, 1);
                            break;
                        }
                    }
                    if (!hitWingman && eb.y > canvas.height + 20) { enemyBullets.splice(i, 1); }
                }
            }

            for (let i = droppedCoins.length - 1; i >= 0; i--) {
                let c = droppedCoins[i];
                c.y += c.speed;
                ctx.fillStyle = "#ffe81f"; ctx.beginPath(); ctx.arc(c.x, c.y, 6, 0, Math.PI * 2); ctx.fill();
                ctx.strokeStyle = "#daa520"; ctx.stroke();

                if (Math.hypot(player.x - c.x, player.y - c.y) < 40) {
                    coins += 10; droppedCoins.splice(i, 1); updateUI();
                } else if (c.y > canvas.height + 20) { droppedCoins.splice(i, 1); }
            }

            for (let i = powerups.length - 1; i >= 0; i--) {
                let p = powerups[i];
                p.y += p.speed;
                if (p.type === 'gem') {
                    ctx.fillStyle = "#0ff";
                    ctx.beginPath(); ctx.moveTo(p.x, p.y - 5); ctx.lineTo(p.x + 5, p.y); ctx.lineTo(p.x, p.y + 5); ctx.lineTo(p.x - 5, p.y); ctx.fill();
                } else {
                    ctx.fillStyle = p.type === 'x2' ? "#0ff" : (p.type === '-2' ? "#f00" : "#f0f");
                    ctx.font = "bold 16px 'Courier New'";
                    ctx.textAlign = "center";
                    ctx.fillText(p.type, p.x, p.y);
                }

                if (Math.hypot(player.x - p.x, player.y - p.y) < 40) {
                    if (p.type === '+100') {
                        coins += 100;
                    } else if (p.type === '-2') {
                        if (wingmen.length > 0) wingmen.splice(-Math.min(2, wingmen.length));
                    } else if (p.type === 'x2') {
                        let currentCount = wingmen.length;
                        purchasedWingmenCount += currentCount;
                        for (let w = 0; w < currentCount; w++) {
                            let c = wingmen.length;
                            let offset = (Math.floor(c / 2) + 1) * 60;
                            let sign = (c % 2 === 0) ? -1 : 1;
                            let hOffset = 20 + Math.floor(c / 2) * 20;
                            wingmen.push({ dx: offset * sign, dy: hOffset, hp: player.ship.hp });
                        }
                    } else if (p.type === 'gem') {
                        coins += 5; // Extra bonus for catching the visual gems
                    }
                    powerups.splice(i, 1);
                    updateUI();
                } else if (p.y > canvas.height + 20) { powerups.splice(i, 1); }
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx; p.y += p.vy; p.life--;
                ctx.fillStyle = p.color; ctx.globalAlpha = p.life / 30; ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI * 2); ctx.fill();
                ctx.globalAlpha = 1.0; if (p.life <= 0) particles.splice(i, 1);
            }

            // --- Three.js WebGL rendering & 3D Synchronization ---
            if (renderer) {
                // Drifting clouds animation
                if (cloudsGroup) {
                    cloudsGroup.children.forEach(cloud => {
                        cloud.position.z += 2.5; // fly over clouds fast
                        if (cloud.position.z > 500) {
                            cloud.position.z = -1000; // wrap far ahead
                            cloud.position.x = (Math.random() - 0.5) * 1200;
                        }
                    });
                }

                // 1. Player jet sync
                if (!playerGroup) {
                    playerGroup = create3DJet(player.ship.id, player.ship.color, true);
                    scene.add(playerGroup);
                } else if (playerGroup.userData.shipId !== player.ship.id) {
                    scene.remove(playerGroup);
                    playerGroup = create3DJet(player.ship.id, player.ship.color, true);
                    scene.add(playerGroup);
                }

                let p3D = to3D(player.x, player.y);
                playerGroup.position.set(p3D.x, p3D.y, p3D.z);

                // Smooth organic flight rotation (pitch & roll)
                let rollTarget = 0;
                if (keys.a) rollTarget = 0.6;
                if (keys.d) rollTarget = -0.6;
                playerGroup.rotation.z = THREE.MathUtils.lerp(playerGroup.rotation.z, rollTarget, 0.1);

                let pitchTarget = 0;
                if (keys.w) pitchTarget = -0.15;
                if (keys.s) pitchTarget = 0.15;
                playerGroup.rotation.x = THREE.MathUtils.lerp(playerGroup.rotation.x, pitchTarget, 0.1);

                // thruster flicker
                if (playerGroup.userData.engines) {
                    playerGroup.userData.engines.forEach(flame => {
                        let scale = 1 + Math.sin(gameFrames * 0.45) * 0.25;
                        flame.scale.set(scale, scale * 1.6, scale);
                    });
                }

                // 2. Wingmen sync
                while (wingmenGroups.length < wingmen.length) {
                    const wmGroup = create3DJet(player.ship.id, player.ship.color, true);
                    wmGroup.scale.set(0.65, 0.65, 0.65);
                    scene.add(wmGroup);
                    wingmenGroups.push(wmGroup);
                }
                while (wingmenGroups.length > wingmen.length) {
                    const wmGroup = wingmenGroups.pop();
                    scene.remove(wmGroup);
                }

                wingmen.forEach((wm, idx) => {
                    const wmGroup = wingmenGroups[idx];
                    let wm3D = to3D(player.x + wm.dx, player.y + wm.dy);
                    wmGroup.position.set(wm3D.x, wm3D.y - 1.5, wm3D.z);
                    wmGroup.rotation.z = playerGroup.rotation.z;
                    wmGroup.rotation.x = playerGroup.rotation.x;

                    if (wmGroup.userData.engines) {
                        wmGroup.userData.engines.forEach(flame => {
                            let scale = 1 + Math.sin((gameFrames + idx) * 0.45) * 0.25;
                            flame.scale.set(scale, scale * 1.6, scale);
                        });
                    }
                });

                // 3. Enemies sync
                const activeEnemyKeys = new Set();
                enemies.forEach((e, idx) => {
                    if (!e.id3d) e.id3d = "enemy_" + Math.random().toString(36).substr(2, 9);
                    activeEnemyKeys.add(e.id3d);

                    let mesh = meshMap.get(e.id3d);
                    if (!mesh) {
                        mesh = create3DJet(e.eData.id !== undefined ? e.eData.id : 1, e.eData.color, false);
                        scene.add(mesh);
                        meshMap.set(e.id3d, mesh);
                    }

                    let e3D = to3D(e.x, e.y);
                    mesh.position.set(e3D.x, e3D.y, e3D.z);
                    mesh.rotation.y = Math.PI;
                    mesh.rotation.z = Math.sin(gameFrames * 0.05 + idx) * 0.1;

                    if (mesh.userData.engines) {
                        mesh.userData.engines.forEach(flame => {
                            let scale = 1 + Math.sin((gameFrames + idx) * 0.5) * 0.2;
                            flame.scale.set(scale, scale * 1.3, scale);
                        });
                    }
                });

                // 4. Boss sync
                if (bossActive && boss) {
                    const bossKey = "boss_main";
                    activeEnemyKeys.add(bossKey);
                    let mesh = meshMap.get(bossKey);
                    if (!mesh) {
                        mesh = create3DJet(23, "#ff3300", false);
                        mesh.scale.set(4, 4, 4);
                        scene.add(mesh);
                        meshMap.set(bossKey, mesh);
                    }
                    let b3D = to3D(boss.x, boss.y);
                    mesh.position.set(b3D.x, b3D.y + 10, b3D.z);
                    mesh.rotation.y = Math.PI;
                    mesh.rotation.z = Math.sin(gameFrames * 0.02) * 0.2;
                }

                // Cleanup dead meshes
                for (let [key, mesh] of meshMap.entries()) {
                    if (!activeEnemyKeys.has(key)) {
                        scene.remove(mesh);
                        meshMap.delete(key);
                    }
                }

                renderer.render(scene, camera);
            }
            requestAnimationFrame(update);
        }

        function gameOver() {
            isGameOver = true;
            document.getElementById('respawnScreen').style.display = 'flex';
        }

        window.respawn = function () {
            player.hp = player.ship.hp + upgrades.hpBonus;
            player.x = canvas.width / 2;
            player.y = canvas.height - 100;
            bullets = [];
            enemies = [];
            enemyBullets = [];
            particles = [];
            powerups = [];
            wingmen = [
                { dx: -60, dy: 20, hp: 100, bulletSpeed: 10 },
                { dx: 60, dy: 20, hp: 100, bulletSpeed: 10 }
            ];
            for (let i = 0; i < purchasedWingmenCount; i++) {
                let offset = (Math.floor(i / 2) + 1) * 60;
                let sign = (i % 2 === 0) ? -1 : 1;
                let hOffset = 20 + Math.floor(i / 2) * 20;
                wingmen.push({ dx: offset * sign, dy: hOffset, hp: player.ship.hp + upgrades.hpBonus });
            }

            isGameOver = false;
            document.getElementById('respawnScreen').style.display = 'none';
            updateUI();
            update(); // Restart loop
        }

        initThree();
        initShop();
        update();

    </script>
</body>

</html>
